server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # DNS resolver for dynamic upstream resolution
    resolver 10.43.0.20 valid=30s ipv6=off;
    resolver_timeout 5s;

    # ============================================
    # Umio Chat API (via n8n webhook V11)
    # 重要：這個特定路由必須放在通用的 /api/umio/ 之前
    # V11: 修正 OpenClaw API URL 404 錯誤
    # ============================================
    location /api/umio/chat {
        set $n8n n8n.zeabur.internal:5678;
        proxy_pass http://$n8n/webhook/umio-chat-v11;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type "application/json; charset=utf-8";
        proxy_set_header Accept-Charset "utf-8";
        # Fire-and-forget: 快速超時，不等待長時間處理
        proxy_connect_timeout 5s;
        proxy_read_timeout 5s;
        proxy_send_timeout 5s;
    }

    # ============================================
    # OpenClaw HTTP Bridge proxy (Andrea/legacy)
    # 注意：這個通用路由必須放在特定路由之後
    # ============================================
    location /api/umio/ {
        set $openclaw_bridge openclaw-http-bridge.zeabur.internal:3000;
        proxy_pass http://$openclaw_bridge;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $http_content_type;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ============================================
    # Telegram Webhook 相關路由
    # ============================================

    # Telegram Webhook 健康檢查
    location /health {
        set $telegram_webhook unified-commerce-hub-stind.zeabur.internal:8080;
        proxy_pass http://$telegram_webhook/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Telegram Webhook 回調（Telegram 伺服器 → telegram-webhook 服務）
    location /webhook/telegram {
        set $telegram_webhook unified-commerce-hub-stind.zeabur.internal:8080;
        proxy_pass http://$telegram_webhook/webhook/telegram;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Web Chat 發送訊息到 OpenClaw
    location /api/send-to-openclaw {
        set $telegram_webhook unified-commerce-hub-stind.zeabur.internal:8080;
        proxy_pass http://$telegram_webhook/api/send-to-openclaw;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Telegram 綁定 API
    location /api/bind-telegram {
        set $telegram_webhook unified-commerce-hub-stind.zeabur.internal:8080;
        proxy_pass http://$telegram_webhook/api/bind-telegram;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Telegram 解綁 API
    location /api/unbind-telegram {
        set $telegram_webhook unified-commerce-hub-stind.zeabur.internal:8080;
        proxy_pass http://$telegram_webhook/api/unbind-telegram;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Telegram 狀態查詢 API
    location /api/telegram-status {
        set $telegram_webhook unified-commerce-hub-stind.zeabur.internal:8080;
        proxy_pass http://$telegram_webhook/api/telegram-status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ============================================
    # n8n Webhook 代理 (Phase 1)
    # ============================================
    location /api/webhook/ {
        set $n8n n8n.zeabur.internal:5678;
        rewrite ^/api/webhook/(.*)$ /webhook/$1 break;
        proxy_pass http://$n8n;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Content-Type $http_content_type;
        proxy_set_header Content-Length $http_content_length;
    }

    # ============================================
    # PocketBase API proxy
    # ============================================
    location /pb/ {
        set $pocketbase pocketbase.zeabur.internal:8090;
        rewrite ^/pb/(.*)$ /$1 break;
        proxy_pass http://$pocketbase;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PocketBase Realtime WebSocket
    location /pb/api/realtime {
        set $pocketbase pocketbase.zeabur.internal:8090;
        rewrite ^/pb/(.*)$ /$1 break;
        proxy_pass http://$pocketbase;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # OpenClaw API proxy
    # ============================================
    location /api/openclaw/ {
        rewrite ^/api/openclaw/(.*)$ /$1 break;
        proxy_pass https://neovegaopenclaw.zeabur.app/;
        proxy_ssl_server_name on;
        proxy_set_header Host neovegaopenclaw.zeabur.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ============================================
    # 前端靜態檔案
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
    }
}
