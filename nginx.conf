server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ============================================
    # Telegram Webhook 相關路由
    # ============================================

    # Telegram Webhook 回調（Telegram 伺服器 → telegram-webhook 服務）
    # 使用變數避免啟動時解析失敗
    location /webhook/telegram {
        resolver 8.8.8.8 valid=30s;
        set $telegram_webhook http://telegram-webhook:3000;
        proxy_pass $telegram_webhook/webhook/telegram;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Web Chat 發送訊息到 OpenClaw
    location /api/send-to-openclaw {
        resolver 8.8.8.8 valid=30s;
        set $telegram_webhook http://telegram-webhook:3000;
        proxy_pass $telegram_webhook/api/send-to-openclaw;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Telegram 綁定 API
    location /api/bind-telegram {
        resolver 8.8.8.8 valid=30s;
        set $telegram_webhook http://telegram-webhook:3000;
        proxy_pass $telegram_webhook/api/bind-telegram;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Telegram 解綁 API
    location /api/unbind-telegram {
        resolver 8.8.8.8 valid=30s;
        set $telegram_webhook http://telegram-webhook:3000;
        proxy_pass $telegram_webhook/api/unbind-telegram;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Telegram 狀態查詢 API
    location /api/telegram-status {
        resolver 8.8.8.8 valid=30s;
        set $telegram_webhook http://telegram-webhook:3000;
        proxy_pass $telegram_webhook/api/telegram-status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ============================================
    # OpenClaw API proxy
    # ============================================
    location /api/openclaw/ {
        rewrite ^/api/openclaw/(.*)$ /$1 break;
        proxy_pass https://neovegaopenclaw.zeabur.app/;
        proxy_ssl_server_name on;
        proxy_set_header Host neovegaopenclaw.zeabur.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ============================================
    # 前端靜態檔案
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
    }
}