server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ============================================
    # Telegram Webhook 相關路由
    # ============================================

    # Telegram Webhook 回調（Telegram 伺服器 → telegram-webhook 服務）
    location /webhook/telegram {
        proxy_pass http://telegram-webhook.zeabur.internal:3000/webhook/telegram;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Web Chat 發送訊息到 OpenClaw
    location /api/send-to-openclaw {
        proxy_pass http://telegram-webhook.zeabur.internal:3000/api/send-to-openclaw;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Telegram 綁定 API
    location /api/bind-telegram {
        proxy_pass http://telegram-webhook.zeabur.internal:3000/api/bind-telegram;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Telegram 解綁 API
    location /api/unbind-telegram {
        proxy_pass http://telegram-webhook.zeabur.internal:3000/api/unbind-telegram;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Telegram 狀態查詢 API
    location /api/telegram-status {
        proxy_pass http://telegram-webhook.zeabur.internal:3000/api/telegram-status;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ============================================
    # PocketBase API proxy
    # ============================================
    location /pb/ {
        proxy_pass http://pocketbase-convo.zeabur.internal:8090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # PocketBase Realtime WebSocket
    location /_/ {
        proxy_pass http://pocketbase-convo.zeabur.internal:8090/_/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================
    # OpenClaw API proxy
    # ============================================
    location /api/openclaw/ {
        rewrite ^/api/openclaw/(.*)$ /$1 break;
        proxy_pass https://neovegaopenclaw.zeabur.app/;
        proxy_ssl_server_name on;
        proxy_set_header Host neovegaopenclaw.zeabur.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ============================================
    # 前端靜態檔案
    # ============================================
    location / {
        try_files $uri $uri/ /index.html;
    }
}